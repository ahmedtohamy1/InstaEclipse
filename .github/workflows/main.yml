name: Android CI

on:
  workflow_dispatch:

jobs:
  build:
    permissions: write-all
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Grant execute permission to gradlew
        run: chmod +x ./gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Upload APK to GoFile
        id: upload_gofile
        run: |
          APK_PATH="app/build/outputs/apk/debug/app-debug.apk"
          if [ ! -f "${APK_PATH}" ]; then
            echo "APK not found at ${APK_PATH}"
            exit 1
          fi

          SERVER=$(curl -s https://api.gofile.io/servers | jq -r '.data.servers[0].name')
          FILE_URL=$(curl -s -F "file=@${APK_PATH}" "https://${SERVER}.gofile.io/uploadFile" | jq -r '.data.downloadPage')

          if [ -z "${FILE_URL}" ] || [ "${FILE_URL}" = "null" ]; then
            echo "Failed to upload APK to GoFile"
            exit 1
          fi

          echo "FILE_URL=${FILE_URL}" >> "$GITHUB_ENV"
          echo "file_url=${FILE_URL}" >> "$GITHUB_OUTPUT"

      - name: Print GoFile URL in Actions
        run: |
          echo "GoFile download URL: ${{ steps.upload_gofile.outputs.file_url }}"
          echo "### APK uploaded to GoFile" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Download URL: ${{ steps.upload_gofile.outputs.file_url }}" >> "$GITHUB_STEP_SUMMARY"
